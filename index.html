<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — Scott Warner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb, #84fab0, #8fd3f4);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 2rem;
    }

    .title {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow: 0 4px 30px rgba(0,0,0,0.15);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.05em;
    }

    .title span {
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }

    .title span:nth-child(1)  { animation-delay: 0.0s; }
    .title span:nth-child(2)  { animation-delay: 0.1s; }
    .title span:nth-child(3)  { animation-delay: 0.2s; }
    .title span:nth-child(4)  { animation-delay: 0.3s; }
    .title span:nth-child(5)  { animation-delay: 0.4s; }
    .title span:nth-child(6)  { animation-delay: 0.5s; }
    .title span:nth-child(7)  { animation-delay: 0.6s; }
    .title span:nth-child(8)  { animation-delay: 0.7s; }
    .title span:nth-child(9)  { animation-delay: 0.8s; }
    .title span:nth-child(10) { animation-delay: 0.9s; }
    .title span:nth-child(11) { animation-delay: 1.0s; }

    .space { width: 0.4em; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25%      { transform: translateY(-20px) rotate(-3deg); }
      75%      { transform: translateY(0) rotate(3deg); }
    }

    .subtitle {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: #fff;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1.5s ease 1s forwards;
      text-shadow: 0 2px 15px rgba(0,0,0,0.15);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 0.95; transform: translateY(0); }
    }

    .dots {
      display: inline-block;
      width: 1.5em;
      text-align: left;
    }

    .dots span {
      animation: dotPulse 1.4s infinite;
      opacity: 0;
    }

    .dots span:nth-child(1) { animation-delay: 0.0s; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 100% { opacity: 0; }
      50%      { opacity: 1; }
    }

    .floater {
      position: absolute;
      font-size: 2rem;
      pointer-events: none;
      animation: float linear infinite;
      z-index: 1;
      opacity: 0.85;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-20vh) rotate(720deg); }
    }

    .signature {
      position: absolute;
      bottom: 2rem;
      left: 0;
      right: 0;
      text-align: center;
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.85;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title" aria-label="Coming Soon">
      <span>C</span><span>O</span><span>M</span><span>I</span><span>N</span><span>G</span>
      <span class="space"></span>
      <span>S</span><span>O</span><span>O</span><span>N</span>
    </h1>
    <p class="subtitle">
      Something new is brewing<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </p>
  </div>

  <div class="signature">— Scott Warner</div>

  <script>
    const emojis = ['✨', '🌸', '⭐', '🎈', '🌈', '💫', '🪐', '🎀', '🌟', '🦋'];
    const body = document.body;

    function spawnFloater() {
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      const duration = 8 + Math.random() * 8;
      el.style.animationDuration = duration + 's';
      el.style.fontSize = (1.2 + Math.random() * 1.8) + 'rem';
      body.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    for (let i = 0; i < 12; i++) {
      setTimeout(spawnFloater, i * 400);
    }
    setInterval(spawnFloater, 600);
  </script>
</body>
</html>
